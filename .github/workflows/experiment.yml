name: Run SAP agent experiment

on:
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all experiment tasks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAP_API_KEY: ${{ secrets.SAP_API_KEY }}
        run: python run_experiment.py --all

      - name: Build findings report
        run: python analyze.py

      - name: Upload run logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: runs/

      - name: Commit findings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add findings/results.md
          git diff --cached --quiet || git commit -m "Update findings from experiment run"
          git push
